maze_finder_node:
  ros__parameters:
    start_key: "s"

    # Geometry / control tuning
    cell_size: 0.30
    forward_speed: 0.10
    turn_speed: 0.60
    position_tolerance: 0.03
    angle_tolerance: 0.07

    # Lidar thresholds
    wall_threshold: 0.40
    clear_threshold: 0.55
    sector_half_width_deg: 18.0

    # Start pose becomes grid origin
    use_goal_cell: false
    goal_cell_x: 0
    goal_cell_y: 0

    # Set these once you inspect the world
    goal_x: 2.0
    goal_y: 2.0
    goal_tolerance: 0.20

    # Safety
    stop_after_goal: true

gem_detector_node:
  ros__parameters:
    cell_size: 0.30
    min_blob_area: 1200
    stable_detection_count: 4
